name: Build, test, and upload PyPI package
'on':
  push:
    branches:
    - main
    - release-**
    tags:
    - v*
  pull_request:
    branches:
    - main
    - release-**
  release:
    types:
    - published
env:
  LC_ALL: en_US.UTF-8
defaults:
  run:
    shell: bash
permissions:
  contents: read
jobs:
  build-package:
    name: Build and check packages
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0
    - name: Build and Inspect
      uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516
  publish-test-pypi:
    name: Publish packages to test.pypi.org
    if: ${{ (github.repository_owner == 'z1fkoisp') && ((github.event.action == 'published')
      || ((github.event_name == 'push') && (github.ref == 'refs/heads/main'))) }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs: build-package
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: Packages
        path: dist
    - name: Upload to Test PyPI
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
      with:
        repository-url: https://test.pypi.org/legacy/
  publish-pypi:
    name: Publish release to pypi.org
    if: ${{ (github.repository_owner == 'z1fkoisp') && (github.event.action == 'published')
      }}
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    needs: build-package
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: Packages
        path: dist
    - name: Sigstore sign package
      uses: sigstore/gh-action-sigstore-python@f7ad0af51a5648d09a20d00370f0a91c3bdf8f84
      with:
        release-signing-artifacts: false
        inputs: './dist/*.tar.gz

          ./dist/*.whl

          '
    - name: Upload artifacts and signatures to GitHub release
      run: 'gh release upload ''${{ github.ref_name }}'' dist/* --repo ''${{ github.repository
        }}''

        '
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Remove sigstore signatures before uploading to PyPI
      run: 'rm ./dist/*.sigstore.json

        '
    - name: Upload to PyPI
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
