name: E2E (NVIDIA L40S x4) SDK Test
'on':
  workflow_dispatch:
    inputs:
      pr_or_branch:
        description: pull request number or branch name
        required: true
        default: main
env:
  TMPDIR: /home/tmp
jobs:
  start-large-ec2-runner:
    if: github.repository_owner == 'z1fkoisp'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.launch-ec2-instance-with-fallback.outputs.label }}
      ec2-instance-id: ${{ steps.launch-ec2-instance-with-fallback.outputs.ec2-instance-id
        }}
      ec2-instance-region: ${{ steps.launch-ec2-instance-with-fallback.outputs.ec2-instance-region
        }}
    steps:
    - name: Checkout "launch-ec2-runner-with-fallback" in-house CI action
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        repository: instructlab/ci-actions
        path: ci-actions
        ref: release-v0.1
        sparse-checkout: 'actions/launch-ec2-runner-with-fallback

          '
    - name: Launch EC2 Runner with Fallback
      id: launch-ec2-instance-with-fallback
      uses: ./ci-actions/actions/launch-ec2-runner-with-fallback
      env:
        TMPDIR: /tmp
      with:
        aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        github_token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        regions_config: "[\n  {\n    \"region\": \"us-east-2\",\n    \"subnets\":\
          \ {\n      \"us-east-2a\": \"${{ vars.SUBNET_US_EAST_2A }}\",\n      \"\
          us-east-2b\": \"${{ vars.SUBNET_US_EAST_2B }}\",\n      \"us-east-2c\":\
          \ \"${{ vars.SUBNET_US_EAST_2C }}\"\n    },\n    \"ec2-ami\": \"${{ vars.AWS_EC2_AMI_US_EAST_2\
          \ }}\",\n    \"security-group-id\": \"${{ vars.SECURITY_GROUP_ID_US_EAST_2\
          \ }}\"\n  },\n  {\n    \"region\": \"us-east-1\",\n    \"subnets\": {\n\
          \      \"us-east-1a\": \"${{ vars.SUBNET_US_EAST_1A }}\",\n      \"us-east-1b\"\
          : \"${{ vars.SUBNET_US_EAST_1B }}\",\n      \"us-east-1c\": \"${{ vars.SUBNET_US_EAST_1C\
          \ }}\",\n      \"us-east-1d\": \"${{ vars.SUBNET_US_EAST_1D }}\",\n    \
          \  \"us-east-1e\": \"${{ vars.SUBNET_US_EAST_1E }}\",\n      \"us-east-1f\"\
          : \"${{ vars.SUBNET_US_EAST_1F }}\"\n    },\n    \"ec2-ami\": \"${{ vars.AWS_EC2_AMI_US_EAST_1\
          \ }}\",\n    \"security-group-id\": \"${{ vars.SECURITY_GROUP_ID_US_EAST_1\
          \ }}\"\n  }\n]\n"
        try_spot_instance_first: false
        ec2_instance_type: g6e.12xlarge
        aws_resource_tags: "[\n  {\"Key\": \"Name\", \"Value\": \"instructlab-ci-github-large-runner\"\
          },\n  {\"Key\": \"GitHubRepository\", \"Value\": \"${{ github.repository\
          \ }}\"},\n  {\"Key\": \"GitHubRef\", \"Value\": \"${{ github.ref }}\"},\n\
          \  {\"Key\": \"GitHubPR\", \"Value\": \"${{ github.event.number }}\"}\n\
          ]\n"
  e2e-medium-test:
    needs:
    - start-large-ec2-runner
    runs-on: ${{ needs.start-large-ec2-runner.outputs.label }}
    permissions:
      pull-requests: write
    steps:
    - name: Install Packages
      run: 'cat /etc/os-release

        mkdir -p "${TMPDIR}"

        sudo dnf install -y gcc gcc-c++ make git python3.11 python3.11-devel

        '
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0
    - name: Install dependent PRs if needed
      uses: depends-on/depends-on-action@61cb3f4a0e2c8ae4b90c9448dc57c7ba9ca24c35
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Fetch and checkout PR
      if: ${{ github.event_name == 'pull_request_target' }}
      run: 'git fetch origin pull/${{ github.event.number }}/head:pr-${{ github.event.number
        }}

        git checkout pr-${{ github.event.number }}

        '
    - name: Update instructlab-training library
      run: 'export CUDA_HOME="/usr/local/cuda"

        export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:/usr/local/cuda/lib64:/usr/local/cuda/extras/CUPTI/lib64"

        export PATH="$PATH:$CUDA_HOME/bin"

        nvidia-smi

        python3.11 -m venv --upgrade-deps venv

        . venv/bin/activate

        pip install instructlab

        pip install instructlab[cuda]

        pip install vllm

        python3.11 -m pip install packaging wheel setuptools-scm

        pip install .

        pip install .[cuda]

        python3.11 -m pip uninstall -y flash-attn

        python3.11 -m pip cache purge

        python3.11 -m pip install ninja

        MAX_JOBS=8 python3.11 -m pip install flash-attn --no-build-isolation

        '
    - name: Check disk before tests
      run: 'df -h

        '
    - name: Run e2e test
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: ". venv/bin/activate\nls scripts\nls ./\n./scripts/test-sdk.sh\n\n# we\
        \ know that the file will be named something like f\"/training_params_and_metrics_global{os.environ['RANK']}.jsonl\"\
        \ in python\n# and we know that it will be written into a directory created\
        \ by `mktemp -d`. \n# Given this information, we can use the following command\
        \ to find the file:\nlog_files=$(find /tmp/ -name \"training_params_and_metrics_global0.jsonl\"\
        )\nphase_num=1;\nfor log_file in $log_files; do\n    mv \"${log_file}\" phase-${phase_num}-training-log.jsonl\n\
        \    ((phase_num++))\ndone\n"
    - name: Check disk after tests
      run: 'df -h

        '
    - name: Upload training logs Phase 1
      uses: actions/upload-artifact@v4
      with:
        name: phase-1-training-log.jsonl
        path: ./phase-1-training-log.jsonl
        retention-days: 1
        overwrite: true
    - name: Upload training logs Phase 2
      uses: actions/upload-artifact@v4
      with:
        name: phase-2-training-log.jsonl
        path: ./phase-2-training-log.jsonl
        retention-days: 1
        overwrite: true
  stop-large-ec2-runner:
    needs:
    - start-large-ec2-runner
    - e2e-medium-test
    runs-on: ubuntu-latest
    if: ${{ always() && github.repository_owner == 'z1fkoisp' }}
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    - name: Stop EC2 runner
      uses: machulav/ec2-github-runner@fb91019e71385fb10dfcbec812b4de8c61589f7b
      with:
        mode: stop
        github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        label: ${{ needs.start-large-ec2-runner.outputs.label }}
        ec2-instance-id: ${{ needs.start-large-ec2-runner.outputs.ec2-instance-id
          }}
  loss-graphs:
    needs:
    - stop-large-ec2-runner
    runs-on: ubuntu-latest
    if: ${{ always() && github.repository_owner == 'z1fkoisp' }}
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install -r requirements-dev.txt

        '
    - name: Download loss data Phase 1
      id: phase-1-download-logs
      uses: actions/download-artifact@v4
      with:
        name: phase-1-training-log.jsonl
        path: downloaded-data
    - name: Download loss data Phase 2
      id: phase-2-download-logs
      uses: actions/download-artifact@v4
      with:
        name: phase-2-training-log.jsonl
        path: downloaded-data
    - name: Try to upload Phase 1 to s3
      id: phase-1-upload-s3
      continue-on-error: true
      run: "python ./scripts/create-loss-graph.py  \\\n  --log-file \"${{ steps.phase-1-download-logs.outputs.download-path\
        \ }}/phase-1-training-log.jsonl\" \\\n  --output-file \"./phase-1-test.md\"\
        \ \\\n  --phase \"1\" \\\n  --aws-region \"${{ vars.AWS_REGION }}\" \\\n \
        \ --bucket-name \"${{ vars.AWS_S3_LOSS_GRAPHS_BUCKET_NAME }}\" \\\n  --base-branch\
        \ \"${GITHUB_REF##*/}\" \\\n  --head-sha \"${{ github.sha }}\" \\\n  --pr-number\
        \ \"${{ github.event.number }}\" \\\n  --origin-repository \"${{ github.repository\
        \ }}\"\n"
    - name: Try to upload Phase 2 to s3
      id: phase-2-upload-s3
      continue-on-error: true
      run: "python ./scripts/create-loss-graph.py  \\\n  --log-file \"${{ steps.phase-2-download-logs.outputs.download-path\
        \ }}/phase-2-training-log.jsonl\" \\\n  --output-file \"./phase-2-test.md\"\
        \ \\\n  --phase \"2\" \\\n  --aws-region \"${{ vars.AWS_REGION }}\" \\\n \
        \ --bucket-name \"${{ vars.AWS_S3_LOSS_GRAPHS_BUCKET_NAME }}\" \\\n  --base-branch\
        \ \"${GITHUB_REF##*/}\" \\\n  --head-sha \"${{ github.sha }}\" \\\n  --pr-number\
        \ \"${{ github.event.number }}\" \\\n  --origin-repository \"${{ github.repository\
        \ }}\"\n"
    - name: Check Phase 1 S3 upload status for success
      if: steps.phase-1-upload-s3.outcome == 'success'
      run: 'echo "Uploaded Phase 1 loss graph to S3."

        cat ./phase-1-test.md >> "${GITHUB_STEP_SUMMARY}"

        '
    - name: Check Phase 2 S3 upload status for success
      if: steps.phase-2-upload-s3.outcome == 'success'
      run: 'echo "Uploaded Phase 2 loss graph to S3."

        cat ./phase-2-test.md >> "${GITHUB_STEP_SUMMARY}"

        '
    - name: Check Phase 1 S3 upload status for failure
      if: steps.phase-1-upload-s3.outcome == 'failure'
      run: 'echo "::warning::Failed to upload Phase 1 loss graph to S3. This won''t
        block the workflow, but you may want to investigate."

        echo "Loss graph upload failed" >> "${GITHUB_STEP_SUMMARY}"

        '
    - name: Check Phase 2 S3 upload status for failure
      if: steps.phase-2-upload-s3.outcome == 'failure'
      run: 'echo "::warning::Failed to upload Phase 2 loss graph to S3. This won''t
        block the workflow, but you may want to investigate."

        echo "Loss graph upload failed" >> "${GITHUB_STEP_SUMMARY}"

        '
